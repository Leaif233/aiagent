services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost
    volumes:
      - backend-uploads:/app/uploads
      - backend-chroma:/app/chroma_data
      - backend-db:/app
    depends_on:
      - redis

  celery-worker:
    build: ./backend
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend-uploads:/app/uploads
      - backend-chroma:/app/chroma_data
      - backend-db:/app
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  backend-uploads:
  backend-chroma:
  backend-db:
  redis-data:
